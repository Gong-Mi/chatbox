# .github/workflows/build-and-test.yml

name: Chatbox Build and Package

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-package:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Package application for ${{ matrix.os }}
      run: |
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          echo "Y" | npm run package
        else
          npm run package
        fi
      shell: bash
      env:
        DEBUG_PROD: "*"
        # 为 UPDATE_CHANNEL 设置一个默认值，以便 electron-builder 不会报错
        # "ci-build" 或 "latest" 或 "alpha" 都是可以接受的临时值
        UPDATE_CHANNEL: "ci-build"

    - name: List packaged files (for debugging)
      run: |
        echo "Listing files in common output directories:"
        ls -R dist || echo "dist directory not found"
        ls -R release || echo "release directory not found"
        ls -R out || echo "out directory not found"
      shell: bash

    - name: Upload Artifact (Installer)
      uses: actions/upload-artifact@v4
      with:
        name: chatbox-installer-${{ matrix.os }}
        path: |
          dist/**/*.exe
          dist/**/*.dmg
          dist/**/*.AppImage
          dist/**/*.deb
          dist/**/*.rpm
          release/**/*.exe
          release/**/*.dmg
          release/**/*.AppImage
          release/**/*.deb
          release/**/*.rpm
          out/**/*.exe
          out/**/*.dmg
          out/**/*.AppImage
          out/**/*.deb
          out/**/*.rpm
        if-no-files-found: warn