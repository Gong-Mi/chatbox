name: Build Android APK for Download

on:
  workflow_dispatch: # 允许你从 GitHub UI 手动触发这个 workflow
  push:
    branches:
      - main # 或者你克隆和修改的分支
    paths: # 仅在相关文件变动时触发 (可选，但能节省资源)
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x # 确认与项目兼容

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # 确认与项目 packageManager 字段一致

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile # 确保 pnpm-lock.yaml 已提交到你的仓库

      # ------------------- Android Specific Setup -------------------
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # 根据项目 Android 构建需求

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        # 如果需要特定版本，可以取消注释并配置
        # with:
        #   api-level: 33
        #   build-tools: "33.0.2"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ------------------- Build Web Assets for Android -------------------
      - name: Build Renderer for Android and Sync
        run: pnpm run mobile:sync:android # 这个脚本应包含 web 构建和 capacitor sync
        env:
          NODE_ENV: production

      # ------------------- Build APK -------------------
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew # gradlew 在 android 目录下
        working-directory: ./android

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: ./android
        # 注意：默认情况下，assembleDebug 生成的 APK 未签名，主要用于测试。
        # 对于 Release APK，你需要配置签名。但如果你只是自己使用，Debug APK 也可以。

      # ------------------- Upload APK Artifact -------------------
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success() # 仅在构建成功时上传
        with:
          name: chatbox-android-debug-apk # Artifact 的名称
          path: android/app/build/outputs/apk/debug/app-debug.apk # APK 文件的路径
          retention-days: 7 # Artifact 保留天数 (可选, 默认90天)