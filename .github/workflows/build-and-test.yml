# .github/workflows/build-and-test.yml

name: Chatbox Build and Package

on:
  push:
    branches:
      - main # 当推送到 main 分支时触发
      - 'feature/**' # 当推送到 feature/* 分支时触发，例如 feature/add-new-gemini-models
  pull_request:
    branches:
      - main # 当有 PR 指向 main 分支时触发

jobs:
  build-and-package:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest] # 为不同平台构建
        node-version: [18.x] # 指定 Node.js 版本，根据项目要求调整

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # 缓存 npm 依赖

    - name: Install dependencies
      run: npm install

    # 可选：如果项目中有 Linting 配置
    # - name: Run Lint
    #   run: npm run lint # 假设有 lint 脚本

    # 可选：如果项目中有单元测试或集成测试 (不涉及实际 API 调用的)
    # - name: Run Tests
    #   run: npm run test # 假设有 test 脚本

    - name: Package application for ${{ matrix.os }}
      # 为 Windows 平台尝试使用管道输入 'Y' 来回应可能的交互提示
      # 对于其他平台，正常运行
      run: |
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          echo "Y" | npm run package
        else
          npm run package
        fi
      shell: bash # 使用 bash 以便跨平台地使用 if [[ ... ]] 语法
                  # 在 Windows runner 上，bash (Git Bash) 通常是可用的
      env:
        DEBUG_PROD: "*" # Chatbox 似乎用这个来显示更多日志

    - name: List packaged files (for debugging)
      run: |
        echo "Listing files in common output directories:"
        ls -R dist || echo "dist directory not found"
        ls -R release || echo "release directory not found"
        ls -R out || echo "out directory not found"
      shell: bash

    - name: Upload Artifact (Installer)
      uses: actions/upload-artifact@v4
      with:
        name: chatbox-installer-${{ matrix.os }}
        path: |
          dist/**/*.exe
          dist/**/*.dmg
          dist/**/*.AppImage
          dist/**/*.deb
          dist/**/*.rpm
          release/**/*.exe
          release/**/*.dmg
          release/**/*.AppImage
          release/**/*.deb
          release/**/*.rpm
          out/**/*.exe
          out/**/*.dmg
          out/**/*.AppImage
          out/**/*.deb
          out/**/*.rpm
        if-no-files-found: warn